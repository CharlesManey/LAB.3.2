<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Frontend Mentor | QR code component</title>
</head>
<body style="background-color: #d5e1ef;">
  <div class="container 
  d-flex 
  justify-content-center 
  align-items-center 
  min-vh-100
  m-auto
  p-1
  ">
    <div class="row">
      <div class="col-3"></div>
      <div class="qr-container
      col
      border
      rounded-4
      d-flex 
      flex-column 
      justify-content-center
      align-items-center
      bg-white 
      w-100
      p-3
      shadow
      "
      >
      <div class="p-0 m-0" ><img src="images/image-qr-code.png" alt="QR code" class="img-fluid rounded-3"></div>
      <div class="p-3 m-0 text-center fs-3 fw-bold">Improve your front-end skills by building projects</div>
      <div class="p-3 pt-0 m-0 text-center fs-5 fw-light">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</div>
      </div>
      <div class="col-3"></div>
    </div>
  </div>
</body>
</html>
