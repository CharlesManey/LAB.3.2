<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>
</head>
<body>
  <main class="card-container">
    <article class="blog-card">
      <div class="blog-img-wrapper">
        <img src="assets/images/illustration-article.svg" alt="blog article illustration" class="blog-img">
      </div>
      <div class="blog-content">
        <div class="category-box">
          <h2 class="category">Learning</h2>
        </div>

        <h3 class="publish-date">Published 21 Dec 2023</h3>

        <h1 class="title">HTML & CSS foundations</h1>

        <p class="description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
        
        <div class="author-box">
          <img src="assets/images/image-avatar.webp" alt="Greg Hooper avatar" class="avatar-pic">
          <h4 class="author">Greg Hooper</h4>
        </div>
      </div>
    </article>
  </main>
</body>
</html>
