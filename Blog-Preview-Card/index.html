<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Frontend Mentor | Blog preview card</title>
</head>
<body style="background-color: #f4d04e;">
  <div class="card-container
  d-flex 
  justify-content-center 
  align-items-center 
  min-vh-100
  m-auto
  p-1
  ">
    <div class="row">
      <div class="col-3"></div>
      <article class="blog-card
      col
      border border-black
      rounded-4
      d-flex 
      flex-column 
      justify-content-center
      align-items-center
      bg-white 
      w-100
      p-4
      ">
        <div class="blog-img-wrapper">
          <img src="assets/images/illustration-article.svg" alt="blog article illustration" class="blog-img img-fluid rounded-4 ">
        </div>
        <div class="blog-content pt-4 m-0">
          <div style="background-color: #f4d04e;" class="category-box w-25 d-flex align-items-center justify-content-center rounded-1 p-1">
            <div class="category fw-bold fs-6">Learning</div>
          </div>

          <div class="publish-date fs-6 fw-semibold pt-2">Published 21 Dec 2023</div>

          <div class="title fs-4 fw-bold pt-2 pb-2">HTML & CSS foundations</div>

          <div class="description fs-6 fw-normal">These languages are the backbone of every website, defining structure, content, and presentation.</div>
          
          <div class="author-box
          d-flex
          align-items-center
          gap-3
          pt-4
          ">
            <img src="assets/images/image-avatar.webp" alt="Greg Hooper avatar" class="avatar-pic">
            <div class="author fs-6 fw-bold">Greg Hooper</div>
          </div>
        </div>
      </article>
      <div class="col-3"></div>
    </div>
  </div>
</body>
</html>
